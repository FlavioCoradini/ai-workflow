name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck install.sh uninstall.sh install-configs.sh setup.sh test/run.sh test/test_install.sh test/scan-secrets.sh scripts/add-skill.sh

      - name: shell syntax (-n)
        run: |
          for f in install.sh uninstall.sh install-configs.sh setup.sh test/run.sh test/test_install.sh test/scan-secrets.sh; do
            sh -n "$f"
          done

      - name: validate skills
        run: ./test/run.sh

      - name: install collision handling
        run: ./test/test_install.sh

      - name: scan harness configs for secrets
        run: ./test/scan-secrets.sh

      - name: validate harness configs (node)
        run: node --check harnesses/opencode/plugins/merge-guard.js && python3 -m json.tool harnesses/claude/settings.json > /dev/null

      - name: install dry-runs (smoke test)
        run: ./install.sh --all --dry-run && ./install-configs.sh --dry-run
